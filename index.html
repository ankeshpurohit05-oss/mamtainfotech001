<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mamta Infotech Store</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<header>

<h1>Mamta Infotech</h1>
<p>Bangalore Laptop Parts Store</p>

<input type="text" id="search" placeholder="Search product">

</header>

<section class="filters">

<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('display')">Displays</button>
<button onclick="filterCategory('mouse')">Mouse</button>
<button onclick="filterCategory('charger')">Chargers</button>

</section>

<section id="products" class="product-grid"></section>

<section class="cart">

<h2>Cart</h2>

<ul id="cart"></ul>

<h3>Total ₹<span id="total">0</span></h3>

<button onclick="placeOrder()">Place Order</button>

</section>

<script src="script.js"></script>

</body>
</html>
